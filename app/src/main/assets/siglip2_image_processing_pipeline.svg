<svg width="100%" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- Stage 1: Input -->
<g>
  <rect x="40" y="30" width="160" height="56" rx="8" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A" x="120" y="52" text-anchor="middle" dominant-baseline="central">Raw image</text>
  <text font-family="sans-serif" font-size="12" fill="#444441" x="120" y="70" text-anchor="middle" dominant-baseline="central">Bitmap from MediaStore URI</text>
</g>

<!-- Stage 2: Resize -->
<g>
  <rect x="40" y="140" width="160" height="56" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#04342C" x="120" y="162" text-anchor="middle" dominant-baseline="central">Resize + crop</text>
  <text font-family="sans-serif" font-size="12" fill="#085041" x="120" y="180" text-anchor="middle" dominant-baseline="central">224×224 center crop</text>
</g>

<!-- Stage 3: Normalize -->
<g>
  <rect x="40" y="250" width="160" height="56" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#04342C" x="120" y="272" text-anchor="middle" dominant-baseline="central">Normalize</text>
  <text font-family="sans-serif" font-size="12" fill="#085041" x="120" y="290" text-anchor="middle" dominant-baseline="central">mean=0.5, std=0.5 → [-1,1]</text>
</g>

<!-- Stage 4: ByteBuffer -->
<g>
  <rect x="40" y="360" width="160" height="56" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#04342C" x="120" y="382" text-anchor="middle" dominant-baseline="central">Pack ByteBuffer</text>
  <text font-family="sans-serif" font-size="12" fill="#085041" x="120" y="400" text-anchor="middle" dominant-baseline="central">[1, 224, 224, 3] NHWC f16</text>
</g>

<!-- Stage 5: Inference -->
<g>
  <rect x="40" y="470" width="160" height="56" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#26215C" x="120" y="492" text-anchor="middle" dominant-baseline="central">LiteRT inference</text>
  <text font-family="sans-serif" font-size="12" fill="#3C3489" x="120" y="510" text-anchor="middle" dominant-baseline="central">NPU → GPU → CPU fallback</text>
</g>

<!-- Stage 6: Output embedding -->
<g>
  <rect x="40" y="560" width="160" height="44" rx="8" fill="#FAC775" stroke="#854F0B" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#412402" x="120" y="582" text-anchor="middle" dominant-baseline="central">Float embedding [768]</text>
</g>

<!-- Vertical arrows left column -->
<line x1="120" y1="86" x2="120" y2="138" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="120" y1="196" x2="120" y2="248" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="120" y1="306" x2="120" y2="358" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="120" y1="416" x2="120" y2="468" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="120" y1="526" x2="120" y2="558" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Debug panels label -->
<text font-family="sans-serif" font-size="12" font-weight="500" fill="#3d3d3a" x="280" y="28">Debug checkpoints</text>

<!-- Debug 1 -->
<rect x="270" y="38" width="200" height="44" rx="8" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" fill="#4A1B0C" x="370" y="56" text-anchor="middle" dominant-baseline="central">Log bitmap W×H</text>
<text font-family="sans-serif" font-size="12" fill="#712B13" x="370" y="72" text-anchor="middle" dominant-baseline="central">assert not null, correct dims</text>
<line x1="200" y1="58" x2="268" y2="58" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- Debug 2 -->
<rect x="270" y="148" width="200" height="44" rx="8" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" fill="#4A1B0C" x="370" y="166" text-anchor="middle" dominant-baseline="central">Save cropped bitmap</text>
<text font-family="sans-serif" font-size="12" fill="#712B13" x="370" y="182" text-anchor="middle" dominant-baseline="central">write to /sdcard for inspection</text>
<line x1="200" y1="168" x2="268" y2="168" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- Debug 3 -->
<rect x="270" y="258" width="200" height="44" rx="8" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" fill="#4A1B0C" x="370" y="276" text-anchor="middle" dominant-baseline="central">Sample pixel values</text>
<text font-family="sans-serif" font-size="12" fill="#712B13" x="370" y="292" text-anchor="middle" dominant-baseline="central">log min/max → expect [-1, 1]</text>
<line x1="200" y1="278" x2="268" y2="278" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- Debug 4 -->
<rect x="270" y="368" width="200" height="44" rx="8" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" fill="#4A1B0C" x="370" y="386" text-anchor="middle" dominant-baseline="central">Verify buffer size</text>
<text font-family="sans-serif" font-size="12" fill="#712B13" x="370" y="402" text-anchor="middle" dominant-baseline="central">1×224×224×3×2 = 301,056 bytes</text>
<line x1="200" y1="388" x2="268" y2="388" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- Debug 5 -->
<rect x="270" y="478" width="200" height="44" rx="8" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" fill="#4A1B0C" x="370" y="496" text-anchor="middle" dominant-baseline="central">Inference timing + delegate</text>
<text font-family="sans-serif" font-size="12" fill="#712B13" x="370" y="512" text-anchor="middle" dominant-baseline="central">log ms, NPU/GPU/CPU path</text>
<line x1="200" y1="498" x2="268" y2="498" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- Debug 6 -->
<rect x="270" y="558" width="200" height="44" rx="8" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" fill="#4A1B0C" x="370" y="576" text-anchor="middle" dominant-baseline="central">L2 norm check</text>
<text font-family="sans-serif" font-size="12" fill="#712B13" x="370" y="592" text-anchor="middle" dominant-baseline="central">||embedding|| ≈ 1.0</text>
<line x1="200" y1="580" x2="268" y2="580" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- Legend -->
<rect x="490" y="180" width="12" height="12" rx="2" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" fill="#3d3d3a" x="508" y="192">Processing step</text>
<rect x="490" y="200" width="12" height="12" rx="2" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" fill="#3d3d3a" x="508" y="212">ML inference</text>
<rect x="490" y="220" width="12" height="12" rx="2" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" fill="#3d3d3a" x="508" y="232">Debug checkpoint</text>
</svg>
